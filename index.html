<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RV32I Simulator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--bg4:#30363d;
    --border:#30363d;--border2:#484f58;
    --text:#e6edf3;--text2:#8b949e;--text3:#6e7681;
    --green:#3fb950;--green2:#238636;--green-bg:#0d1117;
    --blue:#58a6ff;--blue-bg:#1f2937;
    --orange:#f0883e;--red:#f85149;
    --amber:#d29922;
  }
  html,body{height:100%;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);font-size:13px}
  .layout{display:grid;grid-template-rows:48px 1fr;height:100vh}
  
  /* TOPBAR */
  .topbar{display:flex;align-items:center;gap:12px;padding:0 16px;background:var(--bg2);border-bottom:1px solid var(--border);z-index:10}
  .logo{display:flex;align-items:center;gap:8px;margin-right:auto}
  .logo-chip{width:24px;height:24px;background:var(--green2);border-radius:4px;display:flex;align-items:center;justify-content:center}
  .logo-chip svg{width:14px;height:14px;fill:none;stroke:#fff;stroke-width:2}
  .logo-text{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;color:var(--text)}
  .logo-badge{font-size:10px;background:var(--bg3);border:1px solid var(--border2);color:var(--text2);padding:2px 6px;border-radius:4px}
  .btn{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;padding:6px 16px;border-radius:6px;cursor:pointer;border:1px solid;transition:all .15s}
  .btn-run{background:var(--green2);border-color:#2ea043;color:#fff}.btn-run:hover{background:#2ea043}
  .btn-step{background:transparent;border-color:var(--blue);color:var(--blue)}.btn-step:hover{background:#1f2937}
  .btn-reset{background:transparent;border-color:var(--border2);color:var(--text2)}.btn-reset:hover{border-color:var(--red);color:var(--red)}

  /* MAIN */
  .main{display:grid;grid-template-columns:1fr 240px;overflow:hidden}
  
  /* EDITOR */
  .editor-pane{display:flex;flex-direction:column;border-right:1px solid var(--border);overflow:hidden}
  .pane-title{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;letter-spacing:.08em;color:var(--text3);padding:8px 12px;background:var(--bg2);border-bottom:1px solid var(--border);text-transform:uppercase}
  .editor-body{display:flex;flex:1;overflow:hidden;min-height:0}
  .line-numbers{padding:10px 8px;font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.65;color:var(--text3);text-align:right;min-width:36px;background:var(--bg2);border-right:1px solid var(--border);user-select:none;overflow:hidden}
  textarea{flex:1;padding:10px 12px;font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.65;background:var(--bg);color:var(--text);border:none;outline:none;resize:none;tab-size:2}
  textarea::placeholder{color:var(--text3)}
  textarea::-webkit-scrollbar{width:6px}
  textarea::-webkit-scrollbar-track{background:var(--bg)}
  textarea::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}

  /* OUTPUT */
  .output-pane{height:180px;border-top:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
  .output-log{flex:1;overflow-y:auto;padding:8px 12px;font-family:'JetBrains Mono',monospace;font-size:11px;line-height:1.7}
  .output-log::-webkit-scrollbar{width:4px}
  .output-log::-webkit-scrollbar-thumb{background:var(--bg4)}
  .lc{color:var(--text3)}.li{color:var(--blue);font-weight:600}.lr{color:var(--green)}.lm{color:var(--amber)}.le{color:var(--red)}.ld{color:var(--green);font-weight:600}.la{color:var(--text3)}

  /* REGISTER PANE */
  .reg-pane{display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
  .reg-scroll{flex:1;overflow-y:auto;padding:4px 0}
  .reg-scroll::-webkit-scrollbar{width:4px}
  .reg-scroll::-webkit-scrollbar-thumb{background:var(--bg4)}
  .reg-row{display:grid;grid-template-columns:80px 1fr;align-items:center;padding:3px 12px;border-bottom:1px solid var(--border)}
  .reg-row:hover{background:var(--bg2)}
  .rn{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2)}
  .rn span{color:var(--text3);font-size:10px;margin-left:4px}
  .rv{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text);text-align:right;font-weight:500}
  .rv.chg{color:var(--green)}

  /* STATS */
  .stats{border-top:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr;flex-shrink:0}
  .stat{padding:8px 12px;border-right:1px solid var(--border)}
  .stat:nth-child(2){border-right:none}
  .stat:nth-child(3){border-top:1px solid var(--border);border-right:1px solid var(--border)}
  .stat:nth-child(4){border-top:1px solid var(--border);border-right:none}
  .sl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;font-weight:600}
  .sv{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;color:var(--text);margin-top:2px}
  .sv.g{color:var(--green)}.sv.b{color:var(--blue)}

  /* SCROLLBAR GLOBAL */
  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}
</style>
</head>
<body>
<div class="layout">
  <div class="topbar">
    <div class="logo">
      <div class="logo-chip">
        <svg viewBox="0 0 14 14"><rect x="2" y="2" width="10" height="10" rx="1"/><line x1="5" y1="0" x2="5" y2="2"/><line x1="9" y1="0" x2="9" y2="2"/><line x1="5" y1="12" x2="5" y2="14"/><line x1="9" y1="12" x2="9" y2="14"/><line x1="0" y1="5" x2="2" y2="5"/><line x1="0" y1="9" x2="2" y2="9"/><line x1="12" y1="5" x2="14" y2="5"/><line x1="12" y1="9" x2="14" y2="9"/></svg>
      </div>
      <span class="logo-text">RV32I Simulator</span>
      <span class="logo-badge">Single Cycle</span>
    </div>
    <button class="btn btn-run" onclick="runAll()">&#9654; Run</button>
    <button class="btn btn-step" onclick="stepOne()">Step</button>
    <button class="btn btn-reset" onclick="resetSim()">Reset</button>
  </div>

  <div class="main">
    <div class="editor-pane">
      <div class="pane-title">Assembly Editor</div>
      <div class="editor-body">
        <div class="line-numbers" id="lnums">1</div>
        <textarea id="asmcode" spellcheck="false" oninput="updateLines()" placeholder="# Write RV32I assembly
# addi x1, x0, 10
# add  x2, x1, x1">addi x1, x0, 10
addi x2, x0, 5
add  x3, x1, x2
sub  x4, x1, x2
and  x5, x1, x2
or   x6, x1, x2
xor  x7, x1, x2
slt  x8, x2, x1
addi x9, x0, 4
sw   x1, 0(x9)
lw   x10, 0(x9)</textarea>
      </div>
      <div class="output-pane">
        <div class="pane-title">Output — Execution Trace</div>
        <div class="output-log" id="outlog"><span class="la">Ready — press Run or Step to execute</span></div>
      </div>
    </div>

    <div class="reg-pane">
      <div class="pane-title">Register File</div>
      <div class="reg-scroll" id="regs"></div>
      <div class="stats">
        <div class="stat"><div class="sl">PC</div><div class="sv b" id="s-pc">0x00000000</div></div>
        <div class="stat"><div class="sl">Cycle</div><div class="sv" id="s-cy">0</div></div>
        <div class="stat"><div class="sl">Instruction</div><div class="sv" id="s-instr">—</div></div>
        <div class="stat"><div class="sl">ALU Result</div><div class="sv g" id="s-alu">—</div></div>
      </div>
    </div>
  </div>
</div>

<script>
const RNAMES=['zero','ra','sp','gp','tp','t0','t1','t2','s0','s1','a0','a1','a2','a3','a4','a5','a6','a7','s2','s3','s4','s5','s6','s7','s8','s9','s10','s11','t3','t4','t5','t6'];
let cpu=null,prevRegs=new Array(32).fill(0),logLines=[];
function h(n){return'0x'+((n>>>0).toString(16).padStart(8,'0').toUpperCase())}
function hs(n){return'0x'+((n>>>0).toString(16).toUpperCase())}
function updateLines(){
  const n=document.getElementById('asmcode').value.split('\n').length;
  document.getElementById('lnums').innerHTML=Array.from({length:n},(_,i)=>i+1).join('<br>');
}
updateLines();
function parseReg(s){s=s.trim().toLowerCase();if(s.startsWith('x'))return parseInt(s.slice(1));const i=RNAMES.indexOf(s);return i>=0?i:-1;}
function signExt(v,b){const s=1<<(b-1);return(v&(s-1))-(v&s?s:0);}
function assemble(src){
  const lines=src.split('\n'),labels={},instrs=[];let addr=0;
  for(let line of lines){line=line.replace(/#.*/,'').trim();if(!line)continue;if(line.endsWith(':'))labels[line.slice(0,-1)]=addr;else{instrs.push({line,addr});addr+=4;}}
  const out=[];
  for(let{line,addr} of instrs){const enc=encInstr(line,addr,labels);if(enc===null)return{error:'Cannot assemble: '+line};out.push({word:enc,src:line.trim()});}
  return{ok:out};
}
function encInstr(line,pc,labels){
  const t=line.trim().replace(/,/g,' ').replace(/\s+/g,' ').split(' ');
  const op=t[0].toLowerCase();
  const r=i=>parseReg(t[i]);
  const im=i=>{const v=t[i];if(labels[v]!==undefined)return labels[v]-pc;return parseInt(v)||0;};
  const mem=i=>{const m=t[i].match(/(-?\d+)\((.+)\)/);if(!m)return{imm:0,base:0};return{imm:parseInt(m[1]),base:parseReg(m[2])};};
  switch(op){
    case'add':case'sub':case'and':case'or':case'xor':case'sll':case'srl':case'sra':case'slt':case'sltu':{
      const f3s={add:0,sub:0,sll:1,slt:2,sltu:3,xor:4,srl:5,sra:5,or:6,and:7};
      const f7s={sub:0x20,sra:0x20};
      return((f7s[op]||0)<<25)|(r(3)<<20)|(r(2)<<15)|((f3s[op]||0)<<12)|(r(1)<<7)|0x33;}
    case'addi':case'slti':case'xori':case'ori':case'andi':case'slli':case'srli':case'srai':{
      const f3s={addi:0,slti:2,xori:4,ori:6,andi:7,slli:1,srli:5,srai:5};
      const f7s={srai:0x20};let i=im(3);
      if(['slli','srli','srai'].includes(op))i=(i&0x1F)|((f7s[op]||0)<<5);else i=i&0xFFF;
      return(i<<20)|(r(2)<<15)|((f3s[op])<<12)|(r(1)<<7)|0x13;}
    case'lw':case'lh':case'lb':case'lhu':case'lbu':{
      const f3s={lb:0,lh:1,lw:2,lbu:4,lhu:5};const{imm:off,base}=mem(2);
      return((off&0xFFF)<<20)|(base<<15)|((f3s[op])<<12)|(r(1)<<7)|0x03;}
    case'sw':case'sh':case'sb':{
      const f3s={sb:0,sh:1,sw:2};const{imm:off,base}=mem(2);const rs2=r(1);const i=off&0xFFF;
      return((i>>5)<<25)|(rs2<<20)|(base<<15)|((f3s[op])<<12)|((i&0x1F)<<7)|0x23;}
    case'beq':case'bne':case'blt':case'bge':case'bltu':case'bgeu':{
      const f3s={beq:0,bne:1,blt:4,bge:5,bltu:6,bgeu:7};const off=im(3)&0x1FFF;
      return(((off>>12)&1)<<31)|(((off>>5)&0x3F)<<25)|(r(2)<<20)|(r(1)<<15)|((f3s[op])<<12)|(((off>>1)&0xF)<<8)|(((off>>11)&1)<<7)|0x63;}
    case'jal':{const rd=r(1);const off=im(2)&0x1FFFFF;return(((off>>20)&1)<<31)|(((off>>1)&0x3FF)<<21)|(((off>>11)&1)<<20)|(((off>>12)&0xFF)<<12)|(rd<<7)|0x6F;}
    case'jalr':{const i=im(3)&0xFFF;return(i<<20)|(r(2)<<15)|(r(1)<<7)|0x67;}
    case'lui':{return((im(2)&0xFFFFF)<<12)|(r(1)<<7)|0x37;}
    case'auipc':{return((im(2)&0xFFFFF)<<12)|(r(1)<<7)|0x17;}
    case'nop':return 0x00000013;
    default:return null;
  }
}
function getImm(instr){
  const op=instr&0x7F,i=instr>>>0;
  switch(op){
    case 0x13:case 0x03:case 0x67:return signExt((i>>20)&0xFFF,12);
    case 0x23:return signExt(((i>>25)<<5)|((i>>7)&0x1F),12);
    case 0x63:return signExt(((i>>31)<<12)|(((i>>7)&1)<<11)|(((i>>25)&0x3F)<<5)|(((i>>8)&0xF)<<1),13);
    case 0x37:case 0x17:return i&0xFFFFF000;
    case 0x6F:return signExt(((i>>31)<<20)|(((i>>12)&0xFF)<<12)|(((i>>20)&1)<<11)|(((i>>21)&0x3FF)<<1),21);
    default:return 0;
  }
}
function aluC(ALUOp,f3,f7){
  if(ALUOp===0)return 2;if(ALUOp===1)return 6;
  const m={0:f7===0x20?6:2,7:0,6:1,4:3,1:4,5:f7===0x20?8:5,2:7,3:7};return m[f3]??2;
}
function aluOp(a,b,c){
  a=a|0;b=b|0;
  switch(c){
    case 0:return(a&b)>>>0;case 1:return(a|b)>>>0;case 2:return(a+b)>>>0;
    case 6:return(a-b)>>>0;case 3:return(a^b)>>>0;case 4:return(a<<(b&31))>>>0;
    case 5:return(a>>>((b>>>0)&31))>>>0;case 7:return a<b?1:0;case 8:return(a>>(b&31))>>>0;
    default:return 0;
  }
}
function instrName(instr){
  const op=instr&0x7F,f3=(instr>>12)&7,f7=(instr>>25)&0x7F;
  if(op===0x33){const n=['ADD','SLL','SLT','SLTU','XOR','SRL','OR','AND'];return f3===0&&f7===0x20?'SUB':f3===5&&f7===0x20?'SRA':n[f3]||'?';}
  if(op===0x13){const n=['ADDI',null,'SLTI','SLTIU','XORI',null,'SRLI','ORI','ANDI'];return f3===5&&f7===0x20?'SRAI':f3===1?'SLLI':n[f3]||'ADDI';}
  if(op===0x03)return['LB','LH','LW',null,'LBU','LHU'][f3]||'LOAD';
  if(op===0x23)return['SB','SH','SW'][f3]||'STORE';
  if(op===0x63)return['BEQ','BNE',null,null,'BLT','BGE'][f3]||'BR';
  if(op===0x37)return'LUI';if(op===0x17)return'AUIPC';
  if(op===0x6F)return'JAL';if(op===0x67)return'JALR';
  return'NOP';
}
function initCPU(prog){return{regs:new Array(32).fill(0),pc:0,mem:new Array(65536).fill(0),imem:prog,halted:false,cycle:0};}
function stepCPU(cpu,log){
  if(cpu.halted)return;
  const pc=cpu.pc,idx=pc>>2;
  if(idx<0||idx>=cpu.imem.length){cpu.halted=true;if(log)addLog('<span class="ld">&#10003; Halted: end of program</span>');return;}
  const entry=cpu.imem[idx],instr=entry.word>>>0;
  if(instr===0){cpu.halted=true;if(log)addLog('<span class="ld">&#10003; Halted: NOP</span>');return;}
  const op=instr&0x7F,rd=(instr>>7)&0x1F,f3=(instr>>12)&7,rs1=(instr>>15)&0x1F,rs2=(instr>>20)&0x1F,f7=(instr>>25)&0x7F;
  const immV=getImm(instr);
  let RegWrite=0,MemRead=0,MemWrite=0,MemToReg=0,ALUSrc=0,Branch=0,Jump=0,ALUOp=0;
  switch(op){
    case 0x33:RegWrite=1;ALUOp=2;break;case 0x13:RegWrite=1;ALUSrc=1;ALUOp=2;break;
    case 0x03:RegWrite=1;MemRead=1;MemToReg=1;ALUSrc=1;break;case 0x23:MemWrite=1;ALUSrc=1;break;
    case 0x63:Branch=1;ALUOp=1;break;case 0x6F:RegWrite=1;Jump=1;break;
    case 0x67:RegWrite=1;Jump=1;ALUSrc=1;break;case 0x37:case 0x17:RegWrite=1;ALUSrc=1;break;
  }
  const ctrl=aluC(ALUOp,f3,f7);
  const A=cpu.regs[rs1]>>>0,B=cpu.regs[rs2]>>>0,aluB=ALUSrc?(immV>>>0):B;
  let res=op===0x17?(pc+immV)>>>0:op===0x37?immV>>>0:aluOp(A,aluB,ctrl);
  const zero=(res===0)?1:0,pc4=(pc+4)>>>0,brT=(pc+immV)>>>0,jalrT=(A+immV)&~1;
  const brTaken=Branch&&zero&&f3===0;
  let nextPC=brTaken?brT:pc4;
  if(Jump)nextPC=op===0x67?jalrT>>>0:brT;
  let memData=0,memStr='';
  if(MemRead){const ma=res>>>0;memData=((cpu.mem[ma]||0)|((cpu.mem[ma+1]||0)<<8)|((cpu.mem[ma+2]||0)<<16)|((cpu.mem[ma+3]||0)<<24))>>>0;memStr=` <span class="lm">MEM[${hs(ma)}]&#8594;${hs(memData)}</span>`;}
  if(MemWrite){const ma=res>>>0,sv=B>>>0;cpu.mem[ma]=sv&0xFF;cpu.mem[ma+1]=(sv>>8)&0xFF;cpu.mem[ma+2]=(sv>>16)&0xFF;cpu.mem[ma+3]=(sv>>24)&0xFF;memStr=` <span class="lm">MEM[${hs(ma)}]&#8592;${hs(sv)}</span>`;}
  const wdata=Jump?pc4:(MemToReg?memData:res);
  if(RegWrite&&rd!==0)cpu.regs[rd]=wdata>>>0;
  cpu.regs[0]=0;cpu.pc=nextPC;cpu.cycle++;
  const name=instrName(instr);
  if(log){
    let regStr=RegWrite&&rd!==0?` <span class="lr">x${rd}(${RNAMES[rd]})=${hs(wdata)}</span>`:'';
    const brStr=brTaken?` <span class="lm">&#8594;branch ${hs(nextPC)}</span>`:'';
    addLog(`<span class="lc">[${String(cpu.cycle).padStart(3,' ')}]</span> <span class="la">${hs(pc)}</span> <span class="li">${name.padEnd(6)}</span>${regStr}${memStr}${brStr}`);
  }
  document.getElementById('s-pc').textContent=h(nextPC);
  document.getElementById('s-cy').textContent=cpu.cycle;
  document.getElementById('s-instr').textContent=name;
  document.getElementById('s-alu').textContent=hs(res);
  renderRegs();
}
function addLog(html){logLines.push(html);const el=document.getElementById('outlog');el.innerHTML=logLines.join('\n');el.scrollTop=el.scrollHeight;}
function renderRegs(){
  document.getElementById('regs').innerHTML=cpu.regs.map((v,i)=>{
    const ch=v!==prevRegs[i];
    return`<div class="reg-row"><span class="rn">x${i}<span>${RNAMES[i]}</span></span><span class="rv${ch?' chg':''}">${hs(v)}</span></div>`;
  }).join('');
  prevRegs=[...cpu.regs];
}
function buildAndInit(){
  const src=document.getElementById('asmcode').value;
  const res=assemble(src);
  if(res.error){addLog(`<span class="le">&#10007; ${res.error}</span>`);return false;}
  prevRegs=new Array(32).fill(0);cpu=initCPU(res.ok);
  document.getElementById('s-pc').textContent='0x00000000';document.getElementById('s-cy').textContent='0';
  document.getElementById('s-instr').textContent='—';document.getElementById('s-alu').textContent='—';
  renderRegs();return true;
}
function runAll(){
  logLines=[];document.getElementById('outlog').innerHTML='';
  if(!buildAndInit())return;
  addLog(`<span class="la">Assembled ${cpu.imem.length} instructions &#8212; running...</span>`);
  let g=0;while(!cpu.halted&&cpu.pc>>2<cpu.imem.length&&g++<10000)stepCPU(cpu,true);
  addLog(`<span class="ld">&#10003; Done &#8212; ${cpu.cycle} cycles</span>`);
  const nz=cpu.regs.map((v,i)=>v&&i?`<span class="lr">x${i}(${RNAMES[i]})=${hs(v)}</span>`:null).filter(Boolean);
  if(nz.length)addLog(nz.join('  '));
}
function stepOne(){
  if(!cpu){logLines=[];document.getElementById('outlog').innerHTML='';if(!buildAndInit())return;addLog('<span class="la">Stepping...</span>');}
  if(cpu.halted)return;stepCPU(cpu,true);
}
function resetSim(){
  cpu=null;logLines=[];prevRegs=new Array(32).fill(0);
  document.getElementById('outlog').innerHTML='<span class="la">Reset &#8212; press Run or Step</span>';
  document.getElementById('s-pc').textContent='0x00000000';document.getElementById('s-cy').textContent='0';
  document.getElementById('s-instr').textContent='—';document.getElementById('s-alu').textContent='—';
  document.getElementById('regs').innerHTML='';
}
buildAndInit();
</script>
</body>
</html>
